name: CI — Lint, Compile & Test

on:
  push:
    branches: ["**"]        # Run on every branch push
  pull_request:
    branches: [main]        # Gate all PRs targeting main

jobs:
  lint-and-test:
    name: Python ${{ matrix.python-version }} — Lint & Test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      # ── Lint ────────────────────────────────────────────────────
      - name: Lint — Syntax errors & undefined names
        run: |
          flake8 . --count --select=E9,F63,F7,F82 \
                   --show-source --statistics \
                   --exclude=venv,.venv,__pycache__

      - name: Lint — Style warnings (non-blocking)
        run: |
          flake8 . --count --exit-zero \
                   --max-complexity=12 --max-line-length=127 \
                   --statistics \
                   --exclude=venv,.venv,__pycache__

      # ── Compile check ────────────────────────────────────────────
      - name: Compile — Verify Python byte-compilation
        run: |
          python -m py_compile app.py agents.py utils/*.py

      # ── Unit Tests ───────────────────────────────────────────────
      - name: Test — Run pytest suite
        env:
          # Use a dummy key: tests that need a real Groq client are excluded
          GROQ_API_KEY: "ci-test-placeholder-key"
          FLASK_ENV: "testing"
        run: |
          pytest tests/ -v --tb=short
